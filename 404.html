<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Inspo...</title>
    <script>
        (function() {
            var currentPath = window.location.pathname;
            var pathSegments = currentPath.split('/').filter(Boolean);
            var keyword = pathSegments.pop();
            
            if (keyword) {
                keyword = keyword.replace(/\.html$/, '');
                var queryParams = window.location.search;
                var basePath = '/' + pathSegments.join('/');
                if (basePath === '/') basePath = '';
                
                var redirectUrl = basePath + '/detail.html?q=' + encodeURIComponent(keyword);
                if (queryParams) { redirectUrl += '&' + queryParams.substring(1); }
                window.location.replace(redirectUrl);
            } else {
                window.location.replace('/index.html');
            }
        })();
    </script>
</head>
<body style="background-color: #FAF9F6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, sans-serif; color: #333;">
    <div style="text-align: center;">
        <h2 style="color: #FF69B4; font-weight: 800; font-size: 2rem;">Finding your nail inspo...</h2>
        <p style="color: #666; font-size: 1.1rem; margin-top: 10px;">Please wait a moment while we load the gorgeous gallery.</p>
    </div>
</body>
</html>
