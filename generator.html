<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiceNails - Content Generator Tool</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #FAF9F6; padding: 40px 20px; }
        .wrapper { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: #FF69B4; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        textarea { height: 300px; resize: vertical; }
        button { width: 100%; background-color: #FF69B4; color: white; border: none; padding: 14px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>
<div class="wrapper">
    <h2>Nail Content Generator</h2>
    <div class="form-group">
        <label for="keyword">Keyword Utama:</label>
        <input type="text" id="keyword" placeholder="Contoh: aesthetic pink almond nails" autocomplete="off">
    </div>
    <div class="form-group">
        <label for="content">Isi Artikel:</label>
        <textarea id="content" placeholder="H1 Judul&#10;&#10;Paragraf Pertama...&#10;&#10;Paragraf Kedua..."></textarea>
    </div>
    <button onclick="generateAndDownload()">Generate HTML</button>
</div>

<script>
let baseDomain = "https://yourdomain.com/";
fetch('domain.txt').then(r => r.text()).then(data => {
    let domain = data.trim().replace(/\[.*?\]\s*/g, '').replace(/\s*/gi, '').trim();
    if (domain) {
        if (!domain.startsWith('http')) domain = 'https://' + domain;
        if (!domain.endsWith('/')) domain += '/';
        baseDomain = domain;
    }
}).catch(() => {});

function generateAndDownload() {
    const keywordInputVal = document.getElementById('keyword').value.trim();
    const contentInput = document.getElementById('content').value.trim();
    if (!keywordInputVal || !contentInput) { alert('Isi form!'); return; }
    
    const keywordSlug = keywordInputVal.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-');
    const fileName = keywordSlug + '.html';
    const lines = contentInput.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const h1Title = lines[0];
    const remainingParagraphs = lines.slice(1);
    
    let articleBodyHtml = `<h1>${h1Title}</h1>\n`;
    articleBodyHtml += `<center class="ad-wrapper"><script src="https://seribudollarperhari.github.io/banner/ad2.js"><\/script></center>\n`;
    
    const relatedQueries = [`${keywordInputVal} nails`, `${keywordInputVal} nail art`, `${keywordInputVal} aesthetic`, `${keywordInputVal} inspo`];
    
    remainingParagraphs.forEach((p, index) => {
        if (index === 1 || (index > 1 && index % 2 === 1)) {
            const queryIndex = Math.floor(index / 2) % relatedQueries.length;
            const chosenImageQuery = relatedQueries[queryIndex];
            const agcTargetUrl = `${baseDomain}detail.html?q=${chosenImageQuery.replace(/\s+/g, '-').toLowerCase()}`;
            // Ubah Resolusi ke 1080x1620 (Rasio 2:3)
            const imgUrl = `https://tse1.mm.bing.net/th?q=${encodeURIComponent(chosenImageQuery + ' nails')}&w=1080&h=1620&c=7&rs=1&p=0&dpr=2`;
            
            articleBodyHtml += `
            <div class="article-image" style="text-align: center; margin: 25px 0;">
                <a href="${agcTargetUrl}" title="View more about ${chosenImageQuery}" target="_blank">
                    <img src="${imgUrl}" alt="${h1Title} - ${chosenImageQuery}" style="width: 100%; max-width: 450px; height: auto; aspect-ratio: 2/3; object-fit: cover; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
                </a>
            </div>\n`;
        }
        articleBodyHtml += `<p style="margin-bottom:15px; color:#555; text-align:center;">${p}</p>\n`;
    });
    
    const metaDesc = remainingParagraphs[0] ? remainingParagraphs[0].substring(0, 150) + '...' : h1Title;
    
    // OUTPUT AKHIR TANPA NAV MENU & TANPA TOMBOL DOWNLOAD
    const finalHtmlOutput = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${h1Title} | NiceNails</title>
    <meta name="description" content="${metaDesc}">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center class="ad-wrapper"><script src="https://seribudollarperhari.github.io/banner/ad1.js"><\/script></center>
    <header>
        <div class="container">
            <a href="index.html" class="logo-link"><div class="logo">NiceNails</div></a>
        </div>
    </header>
    <main>
        <div class="container">
            <article class="main-article">
                <div class="article-content">
                    ${articleBodyHtml}
                </div>
            </article>
            <center class="ad-wrapper-mid"><script src="https://seribudollarperhari.github.io/banner/ad3.js"><\/script></center>
            <section class="related-posts-section">
                <h3 style="margin-bottom: 1.5rem; text-align: center; font-size: 1.5rem; color: #222;">More Nail Inspiration</h3>
                <div id="related-posts-container" class="wallpaper-grid"></div>
            </section>
            <center class="ad-wrapper"><script src="https://seribudollarperhari.github.io/banner/nativ.js"><\/script></center>
        </div>
    </main>
    <footer>
        <div class="container"><p>&copy; 2026 NiceNails. All rights reserved.</p></div>
    </footer>
    <script>
        (function() {
            const keyword = "${h1Title}";
            const displayed = new Set([keyword.toLowerCase()]);
            function generateRelated() {
                const script = document.createElement('script');
                script.src = 'https://suggestqueries.google.com/complete/search?client=youtube&jsonp=handleRelatedSuggest&hl=en&q=' + encodeURIComponent(keyword + " nails");
                document.head.appendChild(script);
                script.onload = () => script.remove();
                script.onerror = () => loadFallback();
            }
            window.handleRelatedSuggest = function(data) {
                const suggestions = data[1];
                if (!suggestions || suggestions.length === 0) { loadFallback(); return; }
                renderPosts(suggestions.map(item => typeof item === 'string' ? item : item[0]));
            };
            function loadFallback() {
                fetch('keyword.txt').then(res => res.text()).then(data => {
                    const keywords = data.split('\\n').map(k => k.trim()).filter(k => k.length > 0);
                    for (let i = keywords.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [keywords[i], keywords[j]] = [keywords[j], keywords[i]];
                    }
                    renderPosts(keywords);
                }).catch(e => console.log('keyword.txt error'));
            }
            function renderPosts(items) {
                const container = document.getElementById('related-posts-container');
                if (!container) return;
                let html = '';
                let count = 0;
                items.forEach(item => {
                    if(count >= 10) return;
                    let relatedTerm = item.replace(/wallpaper|nails/gi, '').trim();
                    if(!relatedTerm) relatedTerm = item;
                    const termLower = relatedTerm.toLowerCase();
                    if(displayed.has(termLower)) return;
                    displayed.add(termLower);
                    count++;
                    const slug = relatedTerm.replace(/\\s+/g, '-').toLowerCase();
                    const linkUrl = '${baseDomain}detail.html?q=' + slug;
                    const imgUrl = 'https://tse1.mm.bing.net/th?q=' + encodeURIComponent(relatedTerm + ' nails') + '&w=1080&h=1620&c=7&rs=1&p=0&dpr=2';
                    const rTitle = relatedTerm.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') + ' Nails';
                    
                    // Hilangkan tombol download
                    html += '<div class="wallpaper-card"><a href="' + linkUrl + '" class="img-link" title="'+rTitle+'"><img src="' + imgUrl + '" alt="' + rTitle + '" loading="lazy"></a></div>';
                });
                container.innerHTML = html;
            }
            generateRelated();
        })();
    <\/script>
</body>
</html>`;

    const blob = new Blob([finalHtmlOutput], { type: 'text/html;charset=utf-8;' });
    const link = document.createElement("a");
    if (link.download !== undefined) {
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", fileName);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}
</script>
</body>
</html>
